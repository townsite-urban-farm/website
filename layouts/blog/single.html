{{ define "main" }}
<div class="container">
  <article>
    <header class="post-header" style="margin-top:2rem;">
      <h1>{{ .Title }}</h1>
      <div class="post-meta">
        {{ .Date.Format "January 2, 2006" }}
        {{ with .Params.author }} &middot; {{ . }}{{ end }}
      </div>
    </header>
    <div class="post-content card">
      {{ .Content }}
    </div>
    <div style="margin-top:1.5rem; font-family:system-ui,sans-serif; font-size:.9rem;">
      <a href="/blog/">&larr; All posts</a>
    </div>
  </article>
</div>
{{ end }}
